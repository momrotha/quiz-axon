<style>

  h1 { font-size: clamp(1.6rem, 4vw, 2.8rem); font-weight: 800; letter-spacing: -.02em;

  .container { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* STATS BAR */
  .stats-bar {
    display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 2rem;

  .stat { display: flex; flex-direction: column; gap: .2rem; }

  .stat-val { font-size: 1.3rem; font-weight: 800; }
  .stat-val.cyan { color: var(--accent); }
  .stat-val.purple { color: var(--accent2); }
  .stat-val.green { color: var(--accent3); }

  .progress-wrap { flex: 1; min-width: 200px; display: flex; flex-direction: column; justify-content: center; gap: .4rem; }
  .progress-bar-outer { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-bar-inner { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .4s ease; }

  .section-count { margin-left: auto; font-family: 'JetBrains Mono', monospace;

  /* QUESTION CARD */
  .q-card {
    background: var(--surface); border: 1px solid var(--border);

  .q-header { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1rem; }

  .q-text { font-size: .97rem; line-height: 1.6; font-weight: 600; flex: 1; }
  .q-tag {

  .tag-tf { background: rgba(0,212,255,.1); color: var(--accent); border: 1px solid rgba(0,212,255,.2); }
  .tag-qcm { background: rgba(124,58,237,.1); color: #a78bfa; border: 1px solid rgba(124,58,237,.2); }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: .5rem; }
  .opt-btn {

  .opt-btn.correct { border-color: var(--accent3); background: rgba(16,185,129,.08); }

  .opt-btn.revealed-correct .opt-label { background: rgba(16,185,129,.3); color: var(--accent3); }

  /* TF BUTTONS */
  .tf-row { display: flex; gap: .7rem; }
  .tf-btn {
    flex: 1; padding: .65rem 1rem; border-radius: 8px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: .85rem; font-weight: 700;
    letter-spacing: .05em; border: 2px solid var(--border);
    background: var(--surface2); color: var(--text); transition: all .15s;
  }
  .tf-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .tf-btn.correct { border-color: var(--accent3); background: rgba(16,185,129,.12); color: var(--accent3); }
  .tf-btn.wrong { border-color: var(--danger); background: rgba(239,68,68,.12); color: var(--danger); }
  .tf-btn.revealed { border-color: var(--accent3); background: rgba(16,185,129,.06); color: var(--accent3); opacity: .6; }

  /* EXPLANATION */
  .explanation {
    margin-top: .9rem; padding: .8rem 1rem; border-radius: 8px;
    background: rgba(0,212,255,.04); border-left: 3px solid var(--accent);
    font-size: .85rem; line-height: 1.65; color: #94a3b8; display: none;
  }
  .explanation.show { display: block; }
  .explanation strong { color: var(--accent); }

  /* CODE BLOCK */
  pre {
    background: var(--code-bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.1rem 1.2rem; overflow-x: auto;
    margin: .8rem 0; font-family: 'JetBrains Mono', monospace; font-size: .78rem;
    line-height: 1.7; color: #e2e8f0; position: relative;
  }
  .kw { color: #ff7b72; }
  .cls { color: #ffa657; }
  .fn { color: #d2a8ff; }
  .str { color: #a5d6ff; }
  .cmt { color: #8b949e; font-style: italic; }
  .ann { color: #7ee787; }
  .num { color: #79c0ff; }
  .copy-btn {
    position: absolute; top: .5rem; right: .5rem;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: .65rem;
    padding: .2rem .5rem; border-radius: 4px; cursor: pointer; transition: all .15s;
  }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* RESET BTN */
  .reset-btn {
    display: flex; align-items: center; gap: .5rem;
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: 'JetBrains Mono', monospace; font-size: .75rem; padding: .5rem 1rem;
    border-radius: 8px; cursor: pointer; transition: all .2s; margin-bottom: 1.5rem;
  }
  .reset-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* HIDDEN */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* SCORE OVERLAY */
  .score-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,14,26,.95); backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    display: none;
  }
  .score-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
    padding: 3rem; text-align: center; max-width: 400px; width: 90%;
  }
  .score-big { font-size: 4rem; font-weight: 800; background: linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .score-label { font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: .8rem; letter-spacing: .1em; margin-bottom: 1.5rem; }
  .close-score {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: #fff; font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 1rem; padding: .8rem 2rem; border-radius: 10px; cursor: pointer;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media(max-width:600px) {
    .stats-bar { flex-wrap: wrap; }
    .q-card { padding: 1rem; }
  }
</style>

<header>

<script>
const questions = [
  // ─── TRUE / FALSE ───────────────────────────────────────────────────────────
  {id:1,type:'tf',topic:'CQRS',
   text:'CQRS stands for Command Query Responsibility Segregation, meaning commands and queries are handled by separate models.',
   answer:true,
   explain:'CQRS separates the write model (commands) from the read model (queries), allowing each to be optimized independently.'},
  {id:2,type:'tf',topic:'CQRS',
   text:'In CQRS, a Command always returns data to the caller.',
   answer:false,
   explain:'Commands express intent to change state and typically return void or an acknowledgement. Queries return data.'},
  {id:3,type:'tf',topic:'CQRS',
   text:'CQRS requires Event Sourcing to function correctly.',
   answer:false,
   explain:'CQRS and Event Sourcing are complementary but independent patterns. CQRS can be used with a traditional relational store.'},
  {id:4,type:'tf',topic:'Event Sourcing',
   text:'Event Sourcing stores the current state of an entity by persisting all domain events that occurred.',
   answer:true,
   explain:'The event store acts as the source of truth. State is reconstructed by replaying events from the beginning.'},
  {id:5,type:'tf',topic:'Event Sourcing',
   text:'Events in Event Sourcing can be mutated after they are persisted.',
   answer:false,
   explain:'Events are immutable. Once persisted, they represent facts that happened and must never be altered.'},
  {id:6,type:'tf',topic:'Event Sourcing',
   text:'Snapshots in Event Sourcing improve read performance by storing a pre-built aggregate state at a given point.',
   answer:true,
   explain:'Instead of replaying all events from the start, the system can load the latest snapshot and only replay subsequent events.'},
  {id:7,type:'tf',topic:'Axon',
   text:'Axon Framework is a Java/JVM framework that provides implementations of CQRS and Event Sourcing patterns.',
   answer:true,
   explain:'Axon Framework (by AxonIQ) is the leading Java framework for CQRS, Event Sourcing, and DDD.'},
  {id:8,type:'tf',topic:'Axon',
   text:'The @CommandHandler annotation in Axon marks a method that handles query operations.',
   answer:false,
   explain:'@CommandHandler marks methods that handle commands. @QueryHandler is used for query handling.'},
  {id:9,type:'tf',topic:'Axon',
   text:'Axon Server is required to use Axon Framework.',
   answer:false,
   explain:'Axon Server is optional. You can use alternative message routing (e.g., in-memory or Spring AMQP) for development or simpler setups.'},
  {id:10,type:'tf',topic:'Axon',
   text:'In Axon, @Aggregate annotated classes are managed by the Repository and are the root of a DDD aggregate.',
   answer:true,
   explain:'The @Aggregate annotation marks the class as an Axon-managed aggregate root, persisted via command/event handling.'},
  {id:11,type:'tf',topic:'Event Sourcing',
   text:'Projections in Event Sourcing are read-side models built from events.',
   answer:true,
   explain:'Projections (also called "view models" or "read models") consume events and build query-optimized data structures.'},
  {id:12,type:'tf',topic:'CQRS',
   text:'In a CQRS architecture, the read model and write model must share the same database.',
   answer:false,
   explain:'One of CQRS\'s key benefits is polyglot persistence — the write side can use a relational DB while the read side uses Elasticsearch, Redis, etc.'},
  {id:13,type:'tf',topic:'Axon',
   text:'@EventSourcingHandler in Axon is used to apply state changes to the aggregate based on events.',
   answer:true,
   explain:'@EventSourcingHandler methods mutate aggregate state in response to applied events. They are the only place state should change.'},
  {id:14,type:'tf',topic:'Axon',
   text:'Sagas in Axon can only be used with Event Sourcing-backed aggregates.',
   answer:false,
   explain:'Sagas are independent of aggregate storage strategy. They manage long-running processes by reacting to events.'},
  {id:15,type:'tf',topic:'Event Sourcing',
   text:'An event store is typically append-only.',
   answer:true,
   explain:'Append-only is a fundamental property. Events are never deleted or updated — only new events are written.'},
  {id:16,type:'tf',topic:'CQRS',
   text:'Eventual consistency is a common characteristic of CQRS read models.',
   answer:true,
   explain:'Because projections are updated asynchronously, the read model may lag slightly behind the write model — this is eventual consistency.'},
  {id:17,type:'tf',topic:'Axon',
   text:'The CommandGateway in Axon is used to dispatch events.',
   answer:false,
   explain:'CommandGateway dispatches commands. EventGateway (or AggregateLifecycle.apply()) is used to publish events.'},
  {id:18,type:'tf',topic:'Axon',
   text:'Axon supports multi-tenancy scenarios.',
   answer:true,
   explain:'Axon Framework 4.6+ added built-in multi-tenancy support allowing tenant-isolated command/event/query processing.'},
  {id:19,type:'tf',topic:'Event Sourcing',
   text:'Upcasting in Event Sourcing is used to convert old event schemas to newer versions.',
   answer:true,
   explain:'Upcasters transform old event representations to the current schema without modifying stored events.'},
  {id:20,type:'tf',topic:'CQRS',
   text:'Command handlers should contain business logic and validate business rules.',
   answer:true,
   explain:'The command handler (or aggregate command handler) is responsible for validation and enforcing invariants before emitting events.'},

  // ─── QCM ────────────────────────────────────────────────────────────────────
  {id:21,type:'qcm',topic:'CQRS',
   text:'Which of the following best describes the role of a Command in CQRS?',
   options:['Returns a data projection','Expresses intent to change system state','Reads data from the event store','Replays events to rebuild projections'],
   answer:1,
   explain:'A Command is an imperative request that <strong>expresses intent to change state</strong>. It does not return data (only success/failure).'},
  {id:22,type:'qcm',topic:'CQRS',
   text:'What does "Query Responsibility" mean in CQRS?',
   options:['Queries write to the database','Queries handle command validation','Queries only read data and have no side effects','Queries dispatch events'],
   answer:2,
   explain:'Queries are purely read operations. They must not alter system state — no side effects.'},
  {id:23,type:'qcm',topic:'Event Sourcing',
   text:'How is the current state of an aggregate reconstructed in Event Sourcing?',
   options:['By reading the latest snapshot only','By replaying all persisted events in order','By querying the read model database','By calling a REST endpoint'],
   answer:1,
   explain:'The aggregate is reconstituted by <strong>replaying events</strong> from the event store, applying each @EventSourcingHandler in sequence.'},
  {id:24,type:'qcm',topic:'Event Sourcing',
   text:'What is the primary advantage of snapshots in Event Sourcing?',
   options:['They replace events entirely','They allow event mutation','They reduce aggregate load time by avoiding full event replay','They disable event versioning'],
   answer:2,
   explain:'Snapshots cache the aggregate state at a specific version, so only events <em>after</em> the snapshot need replaying.'},
  {id:25,type:'qcm',topic:'Axon',
   text:'In Axon, which annotation is placed on the aggregate identifier field?',
   options:['@CommandHandler','@AggregateIdentifier','@EntityId','@EventSourcingHandler'],
   answer:1,
   explain:'<strong>@AggregateIdentifier</strong> marks the field Axon uses to route commands and events to the correct aggregate instance.'},
  {id:26,type:'qcm',topic:'Axon',
   text:'Which Axon component is responsible for routing commands to the correct handler?',
   options:['EventBus','QueryBus','CommandBus','SagaStore'],
   answer:2,
   explain:'The <strong>CommandBus</strong> dispatches commands to their registered @CommandHandler methods.'},
  {id:27,type:'qcm',topic:'Axon',
   text:'What does AggregateLifecycle.apply() do in Axon?',
   options:['Sends a command','Publishes an event and triggers @EventSourcingHandler','Queries the read model','Persists directly to the database'],
   answer:1,
   explain:'<code>AggregateLifecycle.apply(event)</code> publishes the event on the aggregate, triggering the matching @EventSourcingHandler to mutate state.'},
  {id:28,type:'qcm',topic:'Axon',
   text:'What is the purpose of a Saga in Axon?',
   options:['To store aggregate snapshots','To manage long-running business processes across multiple aggregates','To serve as a read model','To replace the command bus'],
   answer:1,
   explain:'<strong>Sagas</strong> are stateful event listeners that orchestrate long-running processes, potentially spanning multiple aggregates and services.'},
  {id:29,type:'qcm',topic:'CQRS',
   text:'In CQRS, eventual consistency refers to:',
   options:['The command side always being consistent','The read model may temporarily lag behind the write model','Commands never failing','Events always being synchronous'],
   answer:1,
   explain:'Because projections are updated asynchronously, the read model is <strong>eventually consistent</strong> — it converges to the correct state over time.'},
  {id:30,type:'qcm',topic:'Event Sourcing',
   text:'Which of the following is a valid use case for event upcasting?',
   options:['Deleting old events','Converting an old event schema to a newer version','Encrypting events','Dispatching commands'],
   answer:1,
   explain:'<strong>Upcasters</strong> migrate old event representations to current versions when the event schema evolves, without altering stored data.'},
  {id:31,type:'qcm',topic:'Axon',
   text:'Which Axon annotation is used to handle an event in a projection (read model)?',
   options:['@CommandHandler','@SagaEventHandler','@EventHandler','@QueryHandler'],

function getFiltered() {
  if (currentFilter === 'all') return questions;
  if (currentFilter === 'tf') return questions.filter(q => q.type === 'tf');
  if (currentFilter === 'qcm') return questions.filter(q => q.type === 'qcm');
  if (currentFilter === 'code') return questions.filter(q => q.type === 'code');
  return questions;
}

function switchTab(tab) {
  currentFilter = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderQuestions();
  updateStats();
}

function renderQuestions() {
  const container = document.getElementById('questionsContainer');
  const list = getFiltered();
  container.innerHTML = '';

  list.forEach(q => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q-${q.id}`;

    const tagClass = q.type === 'tf' ? 'tag-tf' : q.type === 'code' ? 'tag-code' : 'tag-qcm';
    const tagLabel = q.type === 'tf' ? 'T/F' : q.type === 'code' ? 'CODE' : 'QCM';

    let bodyHTML = '';
    if (q.code) {
      bodyHTML += `<pre><button class="copy-btn" onclick="copyCode(this)">copy</button><code>${q.code}</code></pre>`;
    }

    if (q.type === 'tf') {
      const ans = answers[q.id];
      const trueClass = ans === true ? (ans === q.answer ? 'correct' : 'wrong') : (ans !== undefined && q.answer === true ? 'revealed' : '');
      const falseClass = ans === false ? (ans === q.answer ? 'correct' : 'wrong') : (ans !== undefined && q.answer === false ? 'revealed' : '');
      bodyHTML += `<div class="tf-row">
        <button class="tf-btn ${trueClass}" onclick="answerTF(${q.id}, true)" ${ans !== undefined ? 'disabled' : ''}>TRUE</button>
        <button class="tf-btn ${falseClass}" onclick="answerTF(${q.id}, false)" ${ans !== undefined ? 'disabled' : ''}>FALSE</button>
      </div>`;
    } else {
      bodyHTML += `<div class="options">`;
      q.options.forEach((opt, i) => {
        const ans = answers[q.id];
        let cls = '';
        if (ans !== undefined) {
          if (i === q.answer) cls = ans === i ? 'correct' : 'revealed-correct';
          else if (i === ans) cls = 'wrong';
        }
        bodyHTML += `<button class="opt-btn ${cls}" onclick="answerQCM(${q.id}, ${i})" ${ans !== undefined ? 'disabled' : ''}>
          <span class="opt-label">${String.fromCharCode(65+i)}</span>
          <span>${opt}</span>
        </button>`;
      });
      bodyHTML += `</div>`;
    }

    const showExp = answers[q.id] !== undefined ? 'show' : '';
    bodyHTML += `<div class="explanation ${showExp}" id="exp-${q.id}">${q.explain}</div>`;

    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${q.id}</div>
        <div class="q-text">${q.text}</div>
        <span class="q-tag ${tagClass}">${tagLabel}</span>
      </div>
      ${bodyHTML}
    `;
    container.appendChild(card);
  });
}

function answerTF(id, val) {
  if (answers[id] !== undefined) return;
  answers[id] = val;
  updateStats();
  rerenderQuestion(id);
}

function answerQCM(id, idx) {
  if (answers[id] !== undefined) return;
  answers[id] = idx;
  updateStats();
  rerenderQuestion(id);
}

function rerenderQuestion(id) {
  const q = questions.find(x => x.id === id);
  const card = document.getElementById(`q-${id}`);
  if (!card) return;

  if (q.type === 'tf') {
    const ans = answers[id];
    const btns = card.querySelectorAll('.tf-btn');
    btns[0].className = 'tf-btn ' + (ans === true ? (true === q.answer ? 'correct' : 'wrong') : (q.answer === true ? 'revealed' : ''));
    btns[1].className = 'tf-btn ' + (ans === false ? (false === q.answer ? 'correct' : 'wrong') : (q.answer === false ? 'revealed' : ''));
    btns.forEach(b => b.disabled = true);
  } else {
    const ans = answers[id];
    const btns = card.querySelectorAll('.opt-btn');
    btns.forEach((btn, i) => {
      let cls = '';
      if (i === q.answer) cls = ans === i ? 'correct' : 'revealed-correct';
      else if (i === ans) cls = 'wrong';
      btn.className = `opt-btn ${cls}`;
      btn.disabled = true;
    });
  }
  const exp = document.getElementById(`exp-${id}`);
  if (exp) exp.classList.add('show');
}

function updateStats() {
  const all = questions.length;
  const answered = Object.keys(answers).length;
  let correct = 0;
  questions.forEach(q => {
    if (answers[q.id] !== undefined && answers[q.id] === q.answer) correct++;
  });
  const wrong = answered - correct;
  const score = answered > 0 ? Math.round(correct / answered * 100) : null;

  document.getElementById('statTotal').textContent = all;
  document.getElementById('statAnswered').textContent = answered;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statScore').textContent = score !== null ? score + '%' : '—';
  document.getElementById('progressBar').style.width = (answered / all * 100) + '%';

  if (answered === all) showScore(score, correct, all);
}

function showScore(score, correct, total) {
  document.getElementById('finalScore').textContent = score + '%';
  document.getElementById('finalDetail').textContent = `${correct} correct out of ${total} questions`;
  document.getElementById('scoreOverlay').style.display = 'flex';
}

function closeScore() {
  document.getElementById('scoreOverlay').style.display = 'none';
}

function resetAll() {
  if (!confirm('Reset all answers?')) return;
  answers = {};
  updateStats();
  renderQuestions();
}

function copyCode(btn) {
  const code = btn.nextElementSibling.textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'copied!';
    setTimeout(() => btn.textContent = 'copy', 1500);
  });
}

// Init
renderQuestions();
updateStats();
</script>
</body>
</html>
